
{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
/* Background */
body {
    background: url("{% static 'images/background.jpg' %}") no-repeat center center/cover;
}

/* Overlay for readability */
.form-wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card design */
.form-card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(100px);
    padding: 30px;
    border-radius: 15px;
    width: 600px;
    color: black;
    font-weight: bold;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* Title */
.form-title {
    text-align: center;
    margin-bottom: 20px;
    color: #fff;
    font-weight: bold;
}

/* Input spacing */
.form-control {
    margin-bottom: 15px;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
    font-weight: 500;
    background: rgba(255,255,255,0.9);
    transition: 0.3s;
}
/* Focus effect */
.form-control:focus {
    background: #fff;
    box-shadow: 0 0 5px rgba(13, 110, 253, 0.5);
}
::placeholder {
    color: rgba(0,0,0,0.5);
    font-style: italic;
    font-weight: bolder;
}

/* Button */
.btn-submit {
    width: 100%;
    background: #0d6efd;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
}

.btn-submit:hover {
    background: #0b5ed7;
}
.msg-box {
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
    color: white;
}

.msg-box.error {
    background-color: #dc3545;
}

.msg-box.success {
    background-color: #28a745;
}
</style>

<div class="form-wrapper">

    <div class="form-card">

        <h3 class="form-title">Add Student</h3>
        {% if messages %}
    {% for message in messages %}
        <div class="msg-box {% if message.tags == 'error' %}error{% else %}success{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
        

        <form method="POST">
            {% csrf_token %}

            <!-- BASIC INFO -->
            <div class="row">
                <div class="col-md-6">
                   <input type="text" name="name" placeholder="Name" class="form-control" required>
                </div>
                <div class="col-md-6">
                   <input type="number" name="roll_no" placeholder="Roll No" class="form-control" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <input type="text" name="department" placeholder="Department" class="form-control">
                </div>
                <div class="col-md-6">
                    <input type="number" name="year" placeholder="Year" class="form-control" required>
                </div>
            </div>

            <!-- CONTACT -->
            <div class="row">
                <div class="col-md-6">
                    <input type="text" name="phone" placeholder="Phone" class="form-control">
                </div>
                <div class="col-md-6">
                    <textarea name="address" placeholder="Address" class="form-control"></textarea>
                </div>
            </div>

            <!-- DATES -->
            <div class="row">
                <div class="col-md-6">
                    <label class="text-white">Joining Date</label>
                    <input type="date" name="joining_date" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="text-white">Graduation Date</label>
                    <input type="date" name="graduation_date" class="form-control">
                </div>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn-submit mt-3">Add Student</button>
            

        </form>
        
        

    </div>
    
    

</div>

{% endblock %}
