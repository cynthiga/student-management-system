{% extends 'base.html' %}

{% block content %}

<style>

/* Add space below navbar */
.page-container {
    padding-top: 90px;
    padding-bottom: 40px;
}

/* Card */
.profile-card {
    max-width: 800px;
    margin: auto;
    background: whitesmoke;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* Title */
.profile-title {
    text-align: center;
    margin-bottom: 25px;
    font-weight: bolder;
}

/* Info grid */
.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* Info box */
.info-box {
    background: #c0cedb;
    padding: 20px;
    border-radius: 10px;
    color: blue;
}

/* Label */
.info-box span {
    display: block;
    font-size: 20px;
    color: black;
    font-weight:bold ;
}

/* Value */
.info-box strong {
    font-size: 14px;
}

/* Full width (for address) */
.full-width {
    grid-column: span 2;
}

/* Back button */
.btn-back {
    display: block;
    margin: 25px auto 0;
    padding: 10px 25px;
    border-radius: 8px;
    background: #0d6efd;
    color: white;
    text-decoration: none;
    text-align: center;
    width: 120px;
}

.btn-back:hover {
    background: #0b5ed7;
}

</style>

<div class="page-container">

    <div class="profile-card">

        <h2 class="profile-title">{{ student.name }}</h2>

        <div class="info-grid">

            <div class="info-box">
                <span>Department</span>
                <strong>{{ student.department }}</strong>
            </div>

            <div class="info-box">
                <span>Year</span>
                <strong>{{ student.year }}</strong>
            </div>

            <div class="info-box">
                <span>Phone</span>
                <strong>{{ student.phone }}</strong>
            </div>

            <div class="info-box">
                <span>Joining Date</span>
                <strong>{{ student.joining_date }}</strong>
            </div>

            <div class="info-box">
                <span>Graduation Date</span>
                <strong>{{ student.graduation_date }}</strong>
            </div>

            <div class="info-box full-width">
                <span>Address</span>
                <strong>{{ student.address }}</strong>
            </div>

        </div>

        <a href="{% url 'view' %}" class="btn-back">Back</a>

    </div>

</div>

{% endblock %}
